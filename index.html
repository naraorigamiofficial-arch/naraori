<!DOCTYPE html>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: #f5f5f5;
    margin: 0;
    padding: 50px;
    font-family: 'Inter', sans-serif;
  }

/* The Main Floating Pill */
 .floating-navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background-color: #1c1c1c;
    padding: 8px 8px;
    border-radius: 60px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25), 0 5px 15px rgba(0, 0, 0, 0.1);
    width: max-content;
    margin: 0 auto;
    gap: 32px;
    
    position: fixed;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
    
    /* 🟢 NEW: Tells the navbar to take 0.3 seconds to smoothly animate */
    transition: top 0.3s ease-in-out; 
}

/* 🟢 NEW: The class we will apply to push the navbar out of view */
.floating-navbar.hidden {
    top: -100px; 
}
  /* Left Logo Circle */
  .nav-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    background-color: #ffffff;
    border-radius: 50%;

    flex-shrink: 0;

/* 🟢 THE MISSING RULE: This colors the text and removes the blue underline */

/* 🟢 The hover effect */

  /* 2. Protect the logo from squishing */

    /* Ghost CTA */

    /* Trust pill */

    /* ── HERO ── */
    .hero-section {
      min-height: calc(100vh - 70px);
      display: flex;
      align-items: stretch;
      padding: 0;
      position: relative;
      overflow: hidden;
    }
    .hero-left {
      flex: 1 1 55%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 80px 48px 80px 80px;
      position: relative;
      z-index: 2;
    }
    .hero-right {
      flex: 1 1 45%;
      position: relative;
      min-height: 520px;
      background: #F2F2F2;
    }
    .hero-warrior {
      position: absolute;
      bottom: -40%;
      left: -35%;
      width: 170%;
      height: 140%;
      object-fit: contain;
      object-position: bottom center;
      opacity: 0;
      -webkit-mask-image: linear-gradient(
        to left,
        rgba(0,0,0,1) 50%,
        rgba(0,0,0,0.0) 95%
      );
      mask-image: linear-gradient(to right, transparent 0%, black 25%);
      filter: brightness(0.95) contrast(1.05) grayscale(1);
      animation: warriorFade 1.6s cubic-bezier(0.23,1,0.32,1) both;
      animation-delay: 0.5s;
    }
    @keyframes warriorFade {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 0.9; transform: translateY(0) scale(1); }
    }

    @media(max-width: 768px) {
      .hero-section { flex-direction: column; }
      .hero-left { padding: 60px 24px; align-items: center; text-align: center; flex: none; }
      .hero-right { flex: none; height: 400px; width: 100%; border-left: none; border-top: 1px solid rgba(0,0,0,0.08); }
      .hero-warrior { left: 10%; width: 90%; height: 100%; }
    }

    /* Container section for the CP feature layout */
.cp-showcase-section {
  width: 100%;
  padding: 120px 0; /* Creates an elegant gap between the Hero and the Store */
  display: flex;
  justify-content: flex-start; /* Aligns everything to the left side of the screen */
  overflow: hidden; /* Prevents tilted corners from creating horizontal scrolling bugs */
}

/* Bounds the CP to a fixed area on the left */
.cp-container {
  max-width: 1200px;
  width: 100%;
  margin: 0 auto;
  padding: 0 30px; /* Aligns perfectly with your hero text margins */
  
}

/* The tilted blueprint styling */
.tilted-cp {
  width: 660px; /* Adjust size based on how large you want it to appear */
  height: 660px;
  object-fit: contain;
  
  /* Artistic layout tilt and slight depth shadow */
  transform: rotate(-8deg) scale(1.02); 
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05); 
  
  /* Smoothly blends the edges into your background grid */
  -webkit-mask-image: radial-gradient(circle, rgba(0,0,0,1) 75%, rgba(0,0,0,0) 100%);
  mask-image: radial-gradient(circle, rgba(0,0,0,1) 75%, rgba(0,0,0,0) 100%);
  
  /* Keeps the black vector lines crisp and clear */
  filter: contrast(1.1) brightness(1.0);
  opacity: 0.85;
  
  transition: transform 0.5s ease;
}

/* Subtle interactive lifting effect when hovered */
.tilted-cp:hover {
  transform: rotate(-5deg) scale(1.05);
}

/* Responsive adjustment for phones */
@media(max-width: 768px) {
  .cp-showcase-section { padding: 60px 0; justify-content: center; }
  .cp-container { padding: 0 24px; display: flex; justify-content: center; }
  .tilted-cp { width: 300px; height: 300px; transform: rotate(-4deg); }
}

  <script>
  
  let lastScrollTop = 0;
  const navbar = document.querySelector('.floating-navbar');

  window.addEventListener('scroll', function() {
    // Get the current scroll position
    let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
    
    // If scrolling down AND we are past the top 50 pixels of the page
    if (scrollTop > lastScrollTop && scrollTop > 50) {
      navbar.classList.add('hidden');
    } else {
      // If scrolling up
      navbar.classList.remove('hidden');
    }
    
    // Update the last scroll position for the next calculation
    lastScrollTop = scrollTop;
  });
  </script>
