<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nara Origami Originals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #FFFFFF;
      color: #0A0A0A;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Grid texture overlay */
    .grid-bg { position: relative; }
    .grid-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 1;
    }

    nav, section, .logo-strip, footer, .hr-div {
      position: relative;
      z-index: 10;
    }

    

    /* Metallic CTA button — now dark on light */
    .btn-metal {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: #FFFFFF;
      background: #0A0A0A;
      border: 1px solid #0A0A0A;
      padding: 10px 22px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
      border-radius: 0;
    }
    .btn-metal:hover { background: #2A2A2A; }

    /* Ghost CTA */
    .btn-ghost {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #0A0A0A;
      background: transparent;
      border: 1px solid rgba(0,0,0,0.22);
      padding: 14px 32px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      white-space: nowrap;
      border-radius: 0;
    }
    .btn-ghost:hover {
      background: rgba(0,0,0,0.04);
      border-color: rgba(0,0,0,0.45);
    }

    /* About ghost */
    .btn-about {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #0A0A0A;
      background: transparent;
      border: 1px solid rgba(0,0,0,0.18);
      border-left: none;
      padding: 14px 32px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
      border-radius: 0;
    }
    .btn-about:hover { background: rgba(0,0,0,0.04); }

    /* Trust pill */
    .trust-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(0,0,0,0.04);
      border: 1px solid rgba(0,0,0,0.1);
      padding: 6px 16px 6px 10px;
      font-size: 0.7rem;
      font-weight: 500;
      color: #606060;
      letter-spacing: 0.06em;
      border-radius: 0;
    }
    .trust-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #303030;
    }

    /* ── HERO ── */
    .hero-section {
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      padding: 0;
      position: relative;
      overflow: hidden;
    }
    .hero-left {
      flex: 1 1 55%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 120px 48px 80px 80px;
      position: relative;
      z-index: 2;
    }
    .hero-right {
      flex: 1 1 45%;
      position: relative;
      min-height: 520px;
      background: #F2F2F2;
      
    }
    .hero-warrior {
      position: absolute;
      bottom: -40%;
      left: -60%;
      width: 170%;
      height: 140%;
      object-fit: contain;
      object-position: bottom center;
      opacity: 0;
      -webkit-mask-image: linear-gradient(
        to left,
        rgba(0,0,0,1) 50%,
        rgba(0,0,0,0.0) 95%
      );
        mask-image: linear-gradient(to right, transparent 0%, black 25%);

      filter: brightness(0.95) contrast(1.05) grayscale(1);
      animation: warriorFade 1.6s cubic-bezier(0.23,1,0.32,1) both;
      animation-delay: 0.5s;
    }
    @keyframes warriorFade {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 0.9; transform: translateY(0) scale(1); }
    }

    @media(max-width: 768px) {
      .hero-section { flex-direction: column; }
      .hero-left { padding: 120px 24px 40px; align-items: center; text-align: center; flex: none; }
      .hero-right { flex: none; height: 400px; width: 100%; border-left: none; border-top: 1px solid rgba(0,0,0,0.08); }
      .hero-warrior { left: 10%; width: 90%; height: 100%; }
    }

    .hero-title {
      font-size: clamp(2.8rem, 7vw, 6rem);
      font-weight: 800;
      line-height: 1.0;
      letter-spacing: -0.025em;
      color: #0A0A0A;
      margin-bottom: 24px;
    }
    .hero-title span.metal {
      background: linear-gradient(135deg, #0A0A0A 0%, #606060 50%, #0A0A0A 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-sub {
      font-size: 0.85rem;
      font-weight: 300;
      color: #707070;
      line-height: 1.8;
      letter-spacing: 0.02em;
      max-width: 420px;
      margin-bottom: 40px;
    }
    .feat-check {
      font-size: 0.7rem;
      font-weight: 400;
      color: #909090;
      letter-spacing: 0.06em;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .feat-check::before {
      content: '';
      width: 14px; height: 14px;
      border: 1px solid rgba(0,0,0,0.18);
      display: block;
      flex-shrink: 0;
      background: rgba(0,0,0,0.02);
      border-radius: 0;
    }

    /* ── LOGO STRIP ── */
    .logo-strip {
      border-top: 1px solid rgba(0,0,0,0.07);
      border-bottom: 1px solid rgba(0,0,0,0.07);
      padding: 32px 24px;
    }
    .logo-strip-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 40px 64px;
    }
    .logo-item {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.18);
      transition: color 0.2s;
    }
    .logo-item:hover { color: rgba(0,0,0,0.5); }

    /* ── PAGE LOAD ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fu { animation: fadeUp 0.8s ease both; }
    .fu1 { animation-delay: 0.05s; }
    .fu2 { animation-delay: 0.2s; }
    .fu3 { animation-delay: 0.35s; }
    .fu4 { animation-delay: 0.5s; }
    .fu5 { animation-delay: 0.65s; }

    .hr-div { width: 100%; height: 1px; background: rgba(0,0,0,0.07); }

    /* Footer */
    footer {
      padding: 40px;
      max-width: 1152px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    @media(min-width:640px) {
      footer { flex-direction: row; align-items: center; justify-content: space-between; }
      .nav-links { display: flex; }
    }
    @media(max-width:640px) {
      .nav-links { display: none; }
    }

    .cta-row {
      display: flex;
      align-items: stretch;
    }
  </style>
</head>
<body>

  <!-- ── HERO ── -->
  <section class="hero-section grid-bg">

    <div class="hero-left">
      <div class="trust-pill fu fu1" style="margin-bottom:36px;">
        <span class="trust-dot"></span>
        <span>Nara Origami Originals</span>
      </div>

      <h1 class="hero-title fu fu2" style="text-align:left;">
        <span class="metal">Want to create</span><br/>something<br/>extraordinary?
      </h1>

      <p class="hero-sub fu fu3" style="text-align:left; margin-left:0;">
        The foundation of every great model starts with great paper.
      </p>

      <div class="fu fu4 cta-row" style="margin-bottom:36px;">
        <button class="btn-ghost">Buy Papers &rarr;</button>
        <button class="btn-about">About</button>
      </div>
    </div>

    <div class="hero-right">
      <img
        class="hero-warrior"
        src="wkkk.png"
        alt="Origami warrior sculpture"
      />
    </div>

  </section>
  <script>
    /* 3D TILT — removed, no cards present */
  </script>

</body>
</html>
