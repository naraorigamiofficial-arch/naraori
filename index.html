
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nara Origami Originals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    /* ── DESKTOP BODY ── */
    body {
      background-color: #f5f5f5;
      margin: 0;
      padding: 50px;
      font-family: 'Montserrat', sans-serif;
    }

    /* ── FLOATING NAVBAR ── */
    .floating-navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #1c1c1c;
      padding: 8px 8px;
      border-radius: 60px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.25), 0 5px 15px rgba(0,0,0,0.1);
      width: max-content;
      margin: 0 auto;
      gap: 32px;
      position: fixed;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      transition: top 0.3s ease-in-out;
    }
    .floating-navbar.hidden { top: -100px; }

    .nav-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      background-color: #ffffff;
      border-radius: 50%;
      color: #1c1c1c;
      flex-shrink: 0;
    }
    .nav-logo svg { width: 20px; height: 20px; fill: currentColor; }

    .nav-links {
      display: flex;
      list-style: none;
      margin: 0 24px;
      padding: 0;
      gap: 28px;
    }
    .nav-links li a {
      color: #e0e0e0;
      text-decoration: none;
      font-size: 14.5px;
      font-weight: 400;
      letter-spacing: 0.3px;
      transition: color 0.2s ease;
    }
    .nav-links li a:hover { color: #ffffff; }

    .nav-contact-btn {
      display: flex;
      align-items: center;
      background-color: #ffffff;
      color: #1c1c1c;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 40px;
      font-size: 14.5px;
      font-weight: 500;
      transition: transform 0.2s ease, background-color 0.2s ease;
      flex-shrink: 0;
      white-space: nowrap;
    }

    /* Label swap — desktop shows full email, mobile shows "Contact" */
    .nav-label-short { display: none; }
    .nav-label-full  { display: inline; }

    /* ── GRID BACKGROUND ── */
    .grid-bg { position: relative; }
    .grid-bg::after {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background-image:
        linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: -1;
    }

    nav, section, .logo-strip, footer, .hr-div {
      position: relative;
      z-index: 10;
    }

    /* ── HERO ── */
    .hero-section {
      min-height: calc(100vh - 70px);
      display: flex;
      align-items: stretch;
      padding: 0;
      position: relative;
      overflow: hidden;
    }
    .hero-left {
      flex: 1 1 55%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 80px 48px 80px 80px;
      position: relative;
      z-index: 2;
    }
    .hero-right {
      flex: 1 1 45%;
      position: relative;
      min-height: 520px;
    }
    .hero-warrior {
      position: absolute;
      bottom: -40%;
      left: -35%;
      width: 170%;
      height: 140%;
      object-fit: contain;
      object-position: bottom center;
      opacity: 0;
      -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,1) 50%, rgba(0,0,0,0.0) 95%);
      mask-image: linear-gradient(to right, transparent 0%, black 25%);
      filter: brightness(0.95) contrast(1.05) grayscale(1);
      animation: warriorFade 1.6s cubic-bezier(0.23,1,0.32,1) both;
      animation-delay: 0.5s;
    }
    @keyframes warriorFade {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 0.9; transform: translateY(0) scale(1); }
    }

    .hero-title {
      font-size: clamp(2.8rem, 7vw, 6rem);
      font-weight: 800;
      line-height: 1.0;
      letter-spacing: -0.025em;
      color: #0A0A0A;
      margin-bottom: 24px;
    }
    .hero-title span.metal {
      background: linear-gradient(135deg, #0A0A0A 0%, #606060 50%, #0A0A0A 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-sub {
      font-size: 0.85rem;
      font-weight: 300;
      color: #707070;
      line-height: 1.8;
      letter-spacing: 0.02em;
      max-width: 420px;
      margin-bottom: 40px;
    }

    /* ── PAGE LOAD ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fu { animation: fadeUp 0.8s ease both; }
    .fu1 { animation-delay: 0.05s; }
    .fu2 { animation-delay: 0.2s; }
    .fu3 { animation-delay: 0.35s; }
    .fu4 { animation-delay: 0.5s; }

    .cta-row { display: flex; align-items: stretch; }

    /* ── SCROLL INDICATOR ── */
    .scroll-indicator {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: 1px;
      height: 60px;
      background: rgba(0,0,0,0.15);
      z-index: 10;
      transition: opacity 0.4s ease;
    }
    .scroll-indicator::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #0A0A0A;
      animation: scrollDrop 1.5s cubic-bezier(0.77, 0, 0.175, 1) infinite;
    }
    .scroll-indicator.hidden { opacity: 0; pointer-events: none; }
    @keyframes scrollDrop {
      0%    { transform-origin: top;    transform: scaleY(0); }
      50%   { transform-origin: top;    transform: scaleY(1); }
      50.1% { transform-origin: bottom; transform: scaleY(1); }
      100%  { transform-origin: bottom; transform: scaleY(0); }
    }

    /* ── SCROLL STORY ── */
    .scroll-story-container {
      height: 300vh;
      position: relative;
      z-index: 5;
    }
    .scroll-story-sticky {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .story-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
      padding: 0 24px;
    }
    .story-text {
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 800;
      color: #111;
      margin: 0;
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .story-btn {
      margin-top: 24px;
      padding: 16px 36px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: #111;
      color: #fff;
      text-decoration: none;
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .story-btn:hover { opacity: 0.8 !important; }
    .story-text.visible,
    .story-btn.visible { opacity: 1; transform: translateY(0); }

    /* ── CP SHOWCASE ── */
    .cp-showcase-section {
      width: 100%;
      padding: 120px 0;
      display: flex;
      justify-content: flex-start;
      overflow: hidden;
    }
    .cp-container { max-width: 1200px; width: 100%; margin: 0; padding: 0; }
    .tilted-cp {
      width: 660px;
      height: 660px;
      object-fit: contain;
      margin-left: 48px;
      transform: rotate(-8deg) scale(1.02);
      box-shadow: 0 20px 50px rgba(0,0,0,0.05);
      -webkit-mask-image: radial-gradient(circle, rgba(0,0,0,1) 75%, rgba(0,0,0,0) 100%);
      mask-image: radial-gradient(circle, rgba(0,0,0,1) 75%, rgba(0,0,0,0) 100%);
      filter: contrast(1.1) brightness(1.0);
      opacity: 0.85;
      transition: transform 0.5s ease;
    }
    .tilted-cp:hover { transform: rotate(-5deg) scale(1.05); }

    /* Paper shop section */
    .paper-shop-section {
      max-width: 480px;
      width: 100%;
      margin: 140px auto;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* =============================================
       📱 MOBILE — phones up to 768px
       Everything here overrides desktop. Desktop untouched.
       ============================================= */
    @media (max-width: 768px) {

      /* 1. Kill the 50px desktop border */
      body {
        padding: 0;
      }

      /* 2. Navbar pill — full width, properly centred */
      .floating-navbar {
        width: calc(100vw - 32px); /* 16px margin each side */
        max-width: 480px;
        top: 14px;
        gap: 12px;
        padding: 6px 6px 6px 12px;
        /* override desktop width:max-content */
        min-width: 0;
      }

      .nav-logo {
        width: 36px;
        height: 36px;
        flex-shrink: 0;
      }
      .nav-logo svg { width: 16px; height: 16px; }

      /* Hide links — no room without hamburger */
      .nav-links { display: none; }

      /* Contact button — compact, shows "Contact" label */
      .nav-contact-btn {
        padding: 9px 18px;
        font-size: 13px;
        font-weight: 600;
        flex-shrink: 0;
      }
      .nav-label-full  { display: none; }
      .nav-label-short { display: inline; }

      /* 3. Hero stacks vertically */
      .hero-section {
        flex-direction: column;
        min-height: 100svh;
      }

      .hero-left {
        flex: none;
        padding: 100px 24px 12px;
        align-items: center;
        text-align: center;
      }

      .hero-title {
        font-size: clamp(2.2rem, 10vw, 3.2rem);
        text-align: center;
        margin-bottom: 16px;
      }

      .hero-sub {
        text-align: center;
        max-width: 100%;
        font-size: 0.8rem;
        margin-bottom: 24px;
      }

      .cta-row {
        justify-content: center;
        flex-wrap: wrap;
        gap: 8px;
      }

      /* 4. Image panel — just tall enough to show the figure */
      .hero-right {
        flex: none;
        width: 100%;
        height: clamp(200px, 48vw, 300px);
        min-height: 0;
        position: relative;
        overflow: hidden;
        border-top: 1px solid rgba(0,0,0,0.08);
      }

      .hero-warrior {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 80%;
        height: 130%;
        object-fit: contain;
        object-position: bottom center;
        opacity: 0;
        -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 22%);
        mask-image: linear-gradient(to bottom, transparent 0%, black 22%);
      }

      /* 5. Scroll story text — tighter on phones */
      .story-text {
        font-size: clamp(1.5rem, 7.5vw, 2.4rem);
        line-height: 1.2;
      }
      .story-btn {
        padding: 13px 24px;
        font-size: 0.68rem;
        text-align: center;
        margin-top: 16px;
      }

      /* 6. CP showcase */
      .cp-showcase-section {
        padding: 60px 0;
        justify-content: center;
      }
      .cp-container {
        padding: 0 24px;
        display: flex;
        justify-content: center;
      }
      .tilted-cp {
        width: 280px;
        height: 280px;
        margin-left: 0;
        transform: rotate(-4deg) scale(1.02);
      }

      /* 7. Paper shop */
      .paper-shop-section { margin: 80px auto; }
    }

    /* Extra small phones ≤ 380px */
    @media (max-width: 380px) {
      .hero-title { font-size: 2rem; }
      .floating-navbar { gap: 8px; padding: 5px 5px 5px 10px; }
      .nav-contact-btn { padding: 8px 14px; font-size: 12px; }
    }
  </style>
</head>
<body>

  <nav class="floating-navbar">
    <div class="nav-logo">
      <svg viewBox="0 0 24 24">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
      </svg>
    </div>

    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Paper Gallery</a></li>
      <li><a href="#">Model gallery</a></li>
      <li><a href="#">About</a></li>
    </ul>

    <a href="mailto:Naraorigami.official@gmail.com" class="nav-contact-btn">
      <span class="nav-label-full">Naraorigami.official@gmail.com</span>
      <span class="nav-label-short">Contact</span>
    </a>
  </nav>

  <section class="hero-section grid-bg">
    <div class="hero-left">
      <h1 class="hero-title fu fu2">
        <span class="metal">Want to create</span><br/>something<br/>extraordinary?
      </h1>
    </div>

    <div class="hero-right">
      <img class="hero-warrior" src="imgs/wkkk.png" alt="Origami warrior sculpture" />
    </div>

    <div class="scroll-indicator" id="scroll-hint"></div>
  </section>

  <section class="scroll-story-container">
    <div class="scroll-story-sticky">
      <div class="story-content">
        <h2 class="story-text" id="step-1">To fold better,</h2>
        <h2 class="story-text" id="step-2">You need better paper.</h2>
        <a href="#shop" class="story-btn" id="step-3">Check out Treated Double Tissues</a>
      </div>
    </div>
  </section>

  <script>
    const navbar = document.querySelector('.floating-navbar');
    const scrollHint = document.getElementById('scroll-hint');
    const storyContainer = document.querySelector('.scroll-story-container');
    const step1 = document.getElementById('step-1');
    const step2 = document.getElementById('step-2');
    const step3 = document.getElementById('step-3');

    let lastScrollTop = 0;

    window.addEventListener('scroll', () => {
      let scrollTop = window.pageYOffset || document.documentElement.scrollTop;

      if (navbar) {
        if (scrollTop > lastScrollTop && scrollTop > 50) navbar.classList.add('hidden');
        else navbar.classList.remove('hidden');
      }

      if (scrollHint) scrollHint.classList.toggle('hidden', scrollTop > 50);

      if (storyContainer) {
        const rect = storyContainer.getBoundingClientRect();
        const scrollProgress = (rect.top * -1) / (storyContainer.offsetHeight - window.innerHeight);
        step1.classList.toggle('visible', scrollProgress > 0.1);
        step2.classList.toggle('visible', scrollProgress > 0.35);
        step3.classList.toggle('visible', scrollProgress > 0.6);
      }

      lastScrollTop = scrollTop;
    });
  </script>
</body>
</html>
