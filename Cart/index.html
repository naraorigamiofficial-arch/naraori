<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart — Nara Origami Originals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600;700;800;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="../cart.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    :root {
      --ink:   #0A0A0A;
      --muted: #909090;
      --faint: #E4E4E4;
      --ghost: #F6F6F6;
      --bg:    #FFFFFF;
      --gc:    rgba(0,0,0,0.042);
    }

    body {
      font-family: 'Montserrat', sans-serif;
      color: var(--ink); background: var(--bg);
      background-image:
        linear-gradient(var(--gc) 1px, transparent 1px),
        linear-gradient(90deg, var(--gc) 1px, transparent 1px);
      background-size: 48px 48px;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--faint);
    }
    .nav-inner {
      max-width: 1100px; margin: 0 auto;
      padding: 14px 36px;
      display: flex; align-items: center; justify-content: space-between; gap: 20px;
    }
    .nav-logo { font-size: 0.72rem; font-weight: 800; letter-spacing: 0.08em; text-decoration: none; color: var(--ink); }
    .nav-link  { font-size: 0.68rem; font-weight: 400; color: var(--muted); text-decoration: none; letter-spacing: 0.04em; transition: color .15s; }
    .nav-link:hover { color: var(--ink); }

    /* ── CURRENCY PILL ── */
    .curr-pill {
      position: fixed; bottom: 24px; right: 24px; z-index: 600;
      display: flex; background: var(--ink);
      box-shadow: 0 6px 24px rgba(0,0,0,0.18);
    }
    .curr-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem; font-weight: 500; letter-spacing: 0.05em;
      color: rgba(255,255,255,0.4); background: transparent;
      border: none; padding: 9px 14px; cursor: pointer;
      transition: color .15s, background .15s; position: relative;
    }
    .curr-btn + .curr-btn::before {
      content: ''; position: absolute; left: 0; top: 22%; bottom: 22%;
      width: 1px; background: rgba(255,255,255,0.1);
    }
    .curr-btn:hover { color: rgba(255,255,255,0.7); }
    .curr-btn.active { color: #fff; background: rgba(255,255,255,0.1); }

    /* ── LAYOUT ── */
    .page {
      max-width: 1100px; margin: 0 auto;
      padding: 88px 36px 120px;
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 48px;
      align-items: flex-start;
    }

    /* ── LEFT: ITEMS ── */
    .cart-left {}

    .cart-header {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 32px;
    }
    .cart-title { font-size: clamp(1.6rem, 3vw, 2.2rem); font-weight: 900; letter-spacing: -0.03em; }
    .cart-count { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); }

    /* item rows */
    .cart-items { border-top: 1px solid var(--faint); }

    .cart-item {
      display: grid;
      grid-template-columns: 80px 1fr auto;
      gap: 20px;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid var(--faint);
      animation: fadeIn .25s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .item-img {
      width: 80px; height: 80px;
      border: 1px solid var(--faint);
      object-fit: cover; display: block;
      background: var(--ghost);
      flex-shrink: 0;
    }
    .item-img-ph {
      width: 80px; height: 80px;
      background: var(--ghost); border: 1px solid var(--faint);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.5rem; font-weight: 700; letter-spacing: 0.12em;
      color: var(--faint); text-transform: uppercase; flex-shrink: 0;
    }

    .item-info {}
    .item-cat  { font-size: 0.52rem; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
    .item-name { font-size: 0.9rem; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 3px; }
    .item-sub  { font-size: 0.62rem; font-weight: 300; color: var(--muted); margin-bottom: 12px; }

    .qty-row { display: flex; align-items: center; gap: 0; }
    .qty-btn {
      font-family: 'DM Mono', monospace;
      width: 28px; height: 28px; background: var(--ghost);
      border: 1px solid var(--faint); font-size: 1rem; line-height: 1;
      color: var(--ink); cursor: pointer;
      transition: background .15s; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .qty-btn:hover { background: var(--faint); }
    .qty-num {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem; font-weight: 500;
      width: 36px; text-align: center;
      border-top: 1px solid var(--faint); border-bottom: 1px solid var(--faint);
      height: 28px; line-height: 28px;
      border-left: none; border-right: none;
      background: var(--bg); color: var(--ink);
    }

    .item-right { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 12px; }
    .item-price {
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem; font-weight: 500;
    }
    .item-remove {
      font-size: 0.58rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted);
      background: none; border: none; cursor: pointer;
      transition: color .15s; padding: 0;
    }
    .item-remove:hover { color: #c0392b; }

    /* empty state */
    .cart-empty {
      padding: 80px 0; text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }
    .cart-empty-icon { font-size: 2.5rem; opacity: 0.15; }
    .cart-empty-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--faint); }
    .btn-browse {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.08em;
      color: var(--ink); background: transparent;
      border: 1px solid var(--faint); padding: 11px 24px;
      cursor: pointer; transition: background .15s, border-color .15s; margin-top: 8px;
      text-decoration: none; display: inline-block;
    }
    .btn-browse:hover { background: var(--ghost); border-color: #bbb; }

    /* ── RIGHT: SUMMARY ── */
    .cart-summary {
      position: sticky; top: 80px;
      border: 1px solid var(--faint);
      background: var(--bg);
      padding: 32px;
    }

    .summary-title { font-size: 0.58rem; font-weight: 800; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 24px; }

    .summary-row {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 10px 0; border-bottom: 1px solid var(--faint);
    }
    .summary-row:last-of-type { border-bottom: none; }
    .summary-key { font-size: 0.68rem; font-weight: 400; color: #555; }
    .summary-val { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--ink); }
    .summary-total-row {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 18px 0 24px; border-top: 1px solid var(--ink); margin-top: 4px;
    }
    .summary-total-key { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.04em; }
    .summary-total-val { font-family: 'DM Mono', monospace; font-size: 1.1rem; font-weight: 500; }

    .btn-checkout {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em;
      color: #fff; background: var(--ink); border: none;
      width: 100%; padding: 15px; cursor: pointer;
      transition: background .15s; margin-bottom: 10px;
    }
    .btn-checkout:hover { background: #222; }
    .btn-checkout:disabled { background: var(--faint); color: var(--muted); cursor: not-allowed; }

    .btn-continue {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.66rem; font-weight: 600; letter-spacing: 0.07em;
      color: var(--muted); background: transparent; border: 1px solid var(--faint);
      width: 100%; padding: 12px; cursor: pointer; transition: background .15s;
      text-decoration: none; display: block; text-align: center;
    }
    .btn-continue:hover { background: var(--ghost); }

    .summary-note { font-size: 0.58rem; font-weight: 400; color: var(--muted); text-align: center; margin-top: 16px; line-height: 1.6; }

    /* ── RESPONSIVE ── */
    @media(max-width: 768px) {
      .page { grid-template-columns: 1fr; gap: 32px; padding: 80px 20px 100px; }
      .cart-summary { position: static; }
      .cart-item { grid-template-columns: 64px 1fr auto; gap: 14px; }
      .item-img, .item-img-ph { width: 64px; height: 64px; }
    }
    @media(max-width: 480px) {
      .nav-inner { padding: 14px 16px; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="../Catalog/index.html" class="nav-logo">Nara Origami Originals</a>
    <div style="display:flex;align-items:center;gap:24px;">
      <a href="../Catalog/index.html" class="nav-link">← Continue shopping</a>
    </div>
  </div>
</nav>

<div class="curr-pill">
  <button class="curr-btn active" data-c="USD" onclick="setCurrency('USD')">USD</button>
  <button class="curr-btn" data-c="INR" onclick="setCurrency('INR')">INR</button>
  <button class="curr-btn" data-c="EUR" onclick="setCurrency('EUR')">EUR</button>
</div>

<div class="page">

  <!-- LEFT -->
  <div class="cart-left">
    <div class="cart-header">
      <h1 class="cart-title">Your cart</h1>
      <span class="cart-count" id="cart-count">0 items</span>
    </div>
    <div class="cart-items" id="cart-items">
      <!-- rendered by JS -->
    </div>
  </div>

  <!-- RIGHT -->
  <aside class="cart-summary">
    <p class="summary-title">Order summary</p>

    <div class="summary-row">
      <span class="summary-key">Subtotal</span>
      <span class="summary-val" id="sum-subtotal">—</span>
    </div>
    <div class="summary-row">
      <span class="summary-key">Shipping</span>
      <span class="summary-val" id="sum-shipping">Calculated at checkout</span>
    </div>
    <div class="summary-row">
      <span class="summary-key">Tax</span>
      <span class="summary-val" id="sum-tax">—</span>
    </div>

    <div class="summary-total-row">
      <span class="summary-total-key">Total</span>
      <span class="summary-total-val" id="sum-total">—</span>
    </div>

    <button class="btn-checkout" id="btn-checkout" onclick="goCheckout()">Proceed to checkout →</button>
    <a href="../Catalog/index.html" class="btn-continue">Continue shopping</a>

    <p class="summary-note">Shipping &amp; taxes calculated at checkout.<br>All prices shown in selected currency.</p>
  </aside>

</div>

<script>

  // ── CURRENCY ──────────────────────────────────
  const FX  = { USD:1, INR:83.5, EUR:0.92 };
  const SYM = { USD:'$', INR:'₹', EUR:'€' };
  let activeCurrency = 'USD';

  function fmt(usd) {
    if (usd == null) return '—';
    const val = usd * FX[activeCurrency];
    return SYM[activeCurrency] + (activeCurrency === 'INR'
      ? Math.round(val).toLocaleString('en-IN')
      : val.toFixed(2));
  }

  function setCurrency(c) {
    activeCurrency = c;
    document.querySelectorAll('.curr-btn').forEach(b => b.classList.toggle('active', b.dataset.c === c));
    renderCart();
  }

  // ── RENDER ────────────────────────────────────
  function renderCart() {
    const items   = NaraCart.getAll();
    const wrap    = document.getElementById('cart-items');
    const count   = items.reduce((s,i) => s + i.qty, 0);
    const subtotal = NaraCart.total();
    const tax     = subtotal * 0.0;   // set your tax rate here, e.g. 0.18 for 18% GST
    const total   = subtotal + tax;

    document.getElementById('cart-count').textContent  = count + ' item' + (count !== 1 ? 's' : '');
    document.getElementById('sum-subtotal').textContent = fmt(subtotal);
    document.getElementById('sum-tax').textContent      = tax > 0 ? fmt(tax) : 'Included';
    document.getElementById('sum-total').textContent    = fmt(total);
    document.getElementById('btn-checkout').disabled    = items.length === 0;

    if (items.length === 0) {
      wrap.innerHTML = `
        <div class="cart-empty">
          <div class="cart-empty-icon">○</div>
          <p class="cart-empty-label">Your cart is empty</p>
          <a href="../Catalog/index.html" class="btn-browse">Browse papers →</a>
        </div>`;
      return;
    }

    wrap.innerHTML = items.map(item => {
      const imgHtml = item.image_url
        ? `<img class="item-img" src="${item.image_url}" alt="${item.name}">`
        : `<div class="item-img-ph">IMG</div>`;

      return `
        <div class="cart-item" data-id="${item.id}">
          ${imgHtml}
          <div class="item-info">
            <p class="item-cat">${item.category || 'Paper'}</p>
            <p class="item-name">${item.name}</p>
            <p class="item-sub">${item.subtitle || ''}</p>
            <div class="qty-row">
              <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
              <span class="qty-num">${item.qty}</span>
              <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
            </div>
          </div>
          <div class="item-right">
            <span class="item-price">${fmt(item.price_usd * item.qty)}</span>
            <button class="item-remove" onclick="removeItem(${item.id})">Remove</button>
          </div>
        </div>`;
    }).join('');
  }

  function changeQty(id, delta) {
    const item = NaraCart.getAll().find(i => i.id === id);
    if (!item) return;
    const newQty = item.qty + delta;
    if (newQty < 1) { removeItem(id); return; }
    NaraCart.setQty(id, newQty);
    renderCart();
  }

  function removeItem(id) {
    NaraCart.remove(id);
    renderCart();
  }

  function goCheckout() {
    if (NaraCart.count() === 0) return;
    window.location.href = `../Checkout/index.html`;
  }

  // ── INIT ──────────────────────────────────────
  renderCart();

  // React to cart changes from other tabs
  window.addEventListener('nara:cart-updated', () => renderCart());
</script>
</body>
</html>
